version: '3.9'

services:

  postgres:

    image: postgres:16

    container_name: casemind_postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: casemind
      POSTGRES_PASSWORD: casemind_password
      POSTGRES_DB: casemind_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: